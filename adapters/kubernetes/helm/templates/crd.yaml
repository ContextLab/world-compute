apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: clusterdonations.worldcompute.org
spec:
  group: worldcompute.org
  names:
    kind: ClusterDonation
    listKind: ClusterDonationList
    plural: clusterdonations
    singular: clusterdonation
    shortNames:
      - wcd
  scope: Namespaced
  versions:
    - name: v1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              required: [cpuCap, memoryCap, namespace]
              properties:
                cpuCap:
                  type: string
                  description: "CPU capacity cap (e.g. 4000m)"
                memoryCap:
                  type: string
                  description: "Memory capacity cap (e.g. 8Gi)"
                jobClasses:
                  type: array
                  items:
                    type: string
                  description: "Allowed job classes"
                namespace:
                  type: string
                  description: "Kubernetes namespace for workload pods"
            status:
              type: object
              properties:
                phase:
                  type: string
                  enum: [Pending, Active, Draining, Error]
                message:
                  type: string
      subresources:
        status: {}
      additionalPrinterColumns:
        - name: Phase
          type: string
          jsonPath: .status.phase
        - name: CPU
          type: string
          jsonPath: .spec.cpuCap
        - name: Memory
          type: string
          jsonPath: .spec.memoryCap
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp
