# Default values for worldcompute-k8s-operator

namespace: worldcompute

replicaCount: 1

image:
  repository: ghcr.io/contextlab/worldcompute-k8s-operator
  tag: "0.1.0"
  pullPolicy: IfNotPresent

resources:
  limits:
    cpu: 500m
    memory: 256Mi
  requests:
    cpu: 100m
    memory: 128Mi

# Default donation limits (used if not overridden in ClusterDonation CR)
donation:
  maxCpuMillicores: 4000
  maxRamBytes: 8589934592  # 8Gi
  maxGpuCount: 0

coordinator:
  endpoint: "https://coordinator.worldcompute.io:443"

serviceAccount:
  create: true
  name: worldcompute-operator
