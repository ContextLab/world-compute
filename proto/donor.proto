syntax = "proto3";

package worldcompute.v1;

// DonorService — 6 RPCs per contracts/donor.proto.md
service DonorService {
  // Register a new donor node with the cluster
  rpc Enroll(EnrollRequest) returns (EnrollResponse);
  // Periodic heartbeat from agent to broker/coordinator
  rpc Heartbeat(HeartbeatRequest) returns (HeartbeatResponse);
  // Query current donor status, credits, trust score
  rpc GetDonorStatus(GetDonorStatusRequest) returns (GetDonorStatusResponse);
  // Update consent classes and shard category allowlist
  rpc UpdateConsent(UpdateConsentRequest) returns (UpdateConsentResponse);
  // Initiate withdrawal — stops jobs, begins cleanup
  rpc Withdraw(WithdrawRequest) returns (WithdrawResponse);
  // Confirm withdrawal — wipe working directory, deregister
  rpc ConfirmWithdraw(ConfirmWithdrawRequest) returns (ConfirmWithdrawResponse);
}

message EnrollRequest {
  bytes peer_id = 1;
  bytes attestation_quote = 2;
  PlatformInfo platform = 3;
  repeated string consent_classes = 4;
  repeated string shard_categories = 5;
}

message EnrollResponse {
  string donor_id = 1;
  string cluster_id = 2;
  uint64 caliber_class = 3;
  uint64 trust_tier = 4;
}

message HeartbeatRequest {
  string donor_id = 1;
  string agent_version = 2;
  NodeState state = 3;
  ResourceCapacity available = 4;
}

message HeartbeatResponse {
  repeated string blocked_versions = 1;
  repeated LeaseOffer lease_offers = 2;
}

message GetDonorStatusRequest {
  string donor_id = 1;
  bool verify_credits = 2;
}

message GetDonorStatusResponse {
  string donor_id = 1;
  NodeState state = 2;
  uint64 ncu_balance = 3;
  double trust_score = 4;
  uint64 caliber_class = 5;
  bytes merkle_proof = 6;
}

message UpdateConsentRequest {
  string donor_id = 1;
  repeated string consent_classes = 2;
  repeated string shard_categories = 3;
}

message UpdateConsentResponse {
  bool accepted = 1;
}

message WithdrawRequest {
  string donor_id = 1;
}

message WithdrawResponse {
  uint64 active_leases_cancelled = 1;
  uint64 ncu_balance_remaining = 2;
}

message ConfirmWithdrawRequest {
  string donor_id = 1;
}

message ConfirmWithdrawResponse {
  bool clean = 1;
}

// Shared types

message PlatformInfo {
  string os = 1;
  string arch = 2;
  string sandbox_capability = 3;
  bool has_tpm = 4;
  bool has_gpu = 5;
  string gpu_model = 6;
}

message ResourceCapacity {
  uint64 cpu_millicores = 1;
  uint64 ram_bytes = 2;
  uint64 gpu_vram_bytes = 3;
  uint64 scratch_bytes = 4;
}

enum NodeState {
  NODE_STATE_UNSPECIFIED = 0;
  NODE_STATE_JOINING = 1;
  NODE_STATE_IDLE = 2;
  NODE_STATE_LEASED = 3;
  NODE_STATE_PREEMPTED = 4;
  NODE_STATE_QUARANTINED = 5;
  NODE_STATE_OFFLINE = 6;
}

message LeaseOffer {
  string lease_id = 1;
  string task_id = 2;
  string workload_cid = 3;
  uint64 walltime_budget_ms = 4;
}
