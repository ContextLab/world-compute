apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-coordinator
  labels:
    app: worldcompute
    component: coordinator
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.grpcPort }}
      targetPort: grpc
      protocol: TCP
      name: grpc
    - port: {{ .Values.service.port }}
      targetPort: metrics
      protocol: TCP
      name: metrics
  selector:
    app: worldcompute
    component: coordinator
